name: Flipkart Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        # Run tests and generate HTML report
        # Note: tests are run in headless mode in CI
        python -m pytest tests/test_landing_page.py --html=report.html --self-contained-html
      env:
        # Some libraries might need this to run headlessly
        CHROME_OPTIONS: "--headless"

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: report.html

    - name: Upload Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: logs/

    - name: Upload Screenshots
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failure-screenshots
        path: screenshots/
